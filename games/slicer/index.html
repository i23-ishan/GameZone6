<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fruit Slicer - Arcade X</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="top-bar glass-panel">
        <a href="../../index.html" class="back-btn">⬅ Back</a>
        <div id="playerNameDisplay" style="display: none; color: #00f2fe; font-weight: bold;">👤 Player</div>
        <div class="stats">
            <span>Score: <strong id="score">0</strong></span>
            <span>Lives: <strong id="lives" style="color: #ef4444;">❤️❤️❤️</strong></span>
        </div>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>

        <div id="startScreen" class="overlay">
            <h1 id="screenTitle">Fruit Slicer 🍉</h1>
            <p id="screenMsg">Swipe to slice the fruits! Don't hit the bombs! 💣</p>
            <button onclick="startGame()" class="glow-btn">Start Slicing</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
